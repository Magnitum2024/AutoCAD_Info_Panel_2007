[XLSX]
; Reader: Excel | LibreOffice
Reader=Excel
; Path to LibreOffice executable (used when Reader=LibreOffice)
LibreOfficePath=C:\Program Files\LibreOffice\program\soffice.exe
; Prefer worksheet index to avoid codepage issues
WorksheetIndex=1
; Optional: leave empty, or set ASCII name
WorksheetName=
; 1-based columns (Excel): B=2, E=5
KeyColumn=2
ValueColumn=5
